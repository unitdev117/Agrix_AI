<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agrix Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --accent: #10b981;
      --accent-hover: #059669;
      --accent-light: rgba(16, 185, 129, 0.12);
      --border: rgba(255, 255, 255, 0.08);
      --panel: rgba(20, 20, 25, 0.92);
      --header-bg: rgba(15, 15, 20, 0.98);
      --user-bubble: rgba(16, 185, 129, 0.15);
      --user-bubble-border: rgba(16, 185, 129, 0.3);
      --system-bubble: rgba(40, 40, 50, 0.6);
      --text: #f4f4f5;
      --muted: #a1a1aa;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      margin: 0;
      width: 100vw;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Outfit", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ── Toggle Button ── */
    .widget-toggle {
      position: fixed;
      right: 24px;
      bottom: 24px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      cursor: pointer;
      font-size: 22px;
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4), 0 0 0 0 rgba(16, 185, 129, 0.3);
      z-index: 10;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
      animation: buttonPulse 3s infinite;
    }
    .widget-toggle:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 32px rgba(16, 185, 129, 0.5);
    }
    @keyframes buttonPulse {
      0%, 100% { box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4), 0 0 0 0 rgba(16, 185, 129, 0.3); }
      50% { box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4), 0 0 0 10px rgba(16, 185, 129, 0); }
    }

    /* ── Widget Panel ── */
    .widget-panel {
      position: fixed;
      right: 24px;
      bottom: 96px;
      width: min(390px, calc(100vw - 32px));
      height: 580px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: none;
      flex-direction: column;
      overflow: hidden;
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(255,255,255,0.04),
        inset 0 1px 0 rgba(255,255,255,0.06);
      z-index: 11;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transform: translateY(16px) scale(0.98);
      opacity: 0;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s;
    }
    .widget-panel.open {
      display: flex;
      transform: translateY(0) scale(1);
      opacity: 1;
    }

    /* ── Header ── */
    .header {
      padding: 16px 18px;
      font-weight: 600;
      font-size: 15px;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #10b981, #059669);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
    }
    .header-info {
      flex: 1;
    }
    .header-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }
    .header-status {
      font-size: 12px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: 400;
      margin-top: 2px;
    }
    .header-status::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: statusPulse 2s infinite;
    }
    @keyframes statusPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: transparent;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* ── Message Bubbles ── */
    .msg {
      padding: 11px 14px;
      border-radius: 16px;
      max-width: 85%;
      word-break: break-word;
      font-size: 14px;
      line-height: 1.55;
      animation: msgIn 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user-bubble);
      border: 1px solid var(--user-bubble-border);
      border-bottom-right-radius: 4px;
      color: #ecfdf5;
    }

    .msg.system {
      align-self: center;
      background: transparent;
      border: none;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      max-width: 100%;
      padding: 4px 8px;
    }

    .msg.ai,
    .msg.agent {
      align-self: flex-start;
      background: var(--system-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    
    /* Markdown Styling in AI Bubbles */
    .msg.ai p { margin-bottom: 8px; }
    .msg.ai p:last-child { margin-bottom: 0; }
    .msg.ai ul, .msg.ai ol { margin-left: 20px; margin-bottom: 8px; }
    .msg.ai code { 
      background: rgba(0,0,0,0.3); 
      padding: 2px 4px; 
      border-radius: 4px; 
      font-family: monospace; 
      font-size: 13px;
    }
    .msg.ai pre {
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
      margin-top: 8px;
    }
    .msg.ai pre code { background: none; padding: 0; }

    /* ── Quick Action Buttons ── */
    .quick-actions {
      border-top: 1px solid var(--border);
      padding: 12px;
      display: flex;
      gap: 8px;
      background: rgba(15, 15, 20, 0.5);
      flex-wrap: wrap;
    }
    .quick-actions button {
      flex: 1;
      min-width: 130px;
      border: 1px solid var(--border);
      background: rgba(40, 40, 55, 0.6);
      color: var(--text);
      padding: 11px 10px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }
    .quick-actions button:hover {
      background: var(--accent-light);
      border-color: rgba(16, 185, 129, 0.4);
      transform: translateY(-1px);
    }

    /* ── Profile + Chat Controls ── */
    .profile-controls,
    .controls {
      border-top: 1px solid var(--border);
      padding: 12px;
      display: flex;
      gap: 8px;
      background: rgba(15, 15, 20, 0.5);
    }

    .profile-controls input,
    .controls input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      background: rgba(40, 40, 55, 0.6);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .profile-controls input:focus,
    .controls input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
    }
    .profile-controls input::placeholder,
    .controls input::placeholder {
      color: #52525b;
    }

    .profile-controls button,
    .controls button {
      border: none;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      padding: 11px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
    .profile-controls button:hover,
    .controls button:hover {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none !important;
    }
  </style>
</head>
<body>
  <button id="widgetToggle" class="widget-toggle" aria-label="Open chat">💬</button>

  <section id="widgetPanel" class="widget-panel" aria-live="polite">
    <div class="header">
      <div class="header-icon">🌱</div>
      <div class="header-info">
        <div class="header-title">Agrix Support</div>
        <div class="header-status">Online</div>
      </div>
    </div>
    <div id="messages" class="messages"></div>

    <div id="quickActions" class="quick-actions" style="display: none;">
      <button id="talkAiBtn">Talk to Agrix AI</button>
      <button id="talkPersonnelBtn">Talk to Agrix Personnel</button>
    </div>

    <div id="languageActions" class="quick-actions" style="display: none;">
      <button data-lang="en">English</button>
      <button data-lang="hi">Hindi</button>
      <button data-lang="bn">Bengali</button>
      <button data-lang="bho">Bhojpuri</button>
    </div>

    <div id="profileControls" class="profile-controls" style="display: none;">
      <input id="profileInput" type="text" placeholder="Type your answer" />
      <button id="profileSend">Send</button>
    </div>

    <div id="chatControls" class="controls" style="display: none;">
      <input id="chatInput" type="text" placeholder="Ask Agrix AI anything…" />
      <button id="chatSend">Send</button>
    </div>
  </section>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="./widget.js"></script>
</body>
</html>
